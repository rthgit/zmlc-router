name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  standalone:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: windows-x64
          - os: macos-latest
            asset: macos-arm64
          - os: ubuntu-latest
            asset: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e . pyinstaller
      - run: python benchmarks/generate_public_corpus.py
      - run: python -m zmlc.cli benchmark benchmarks/public_mixed_200.jsonl --report build/benchmark/report.json
      - run: python scripts/build_plugin_runtime.py
      - run: python scripts/check_release.py
      - run: python scripts/build_standalone.py --output dist/zmlc-router-${{ matrix.asset }}
      - run: python scripts/package_bundle.py --source dist/zmlc-router-${{ matrix.asset }} --output artifacts/zmlc-router-${{ matrix.asset }}.zip
      - uses: sigstore/cosign-installer@v3.8.2
      - shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle artifacts/zmlc-router-${{ matrix.asset }}.zip.sigstore.json \
            artifacts/zmlc-router-${{ matrix.asset }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: zmlc-router-${{ matrix.asset }}
          path: artifacts/*

  python-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - shell: bash
        run: sha256sum dist/* > dist/SHA256SUMS-python.txt
      - uses: sigstore/cosign-installer@v3.8.2
      - shell: bash
        run: |
          for file in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "${file}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-signed
          path: dist/*

  publish:
    needs: [standalone, python-package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
