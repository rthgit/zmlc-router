name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src tests scripts benchmarks
      - run: python -m unittest discover -s tests -v
      - run: python benchmarks/generate_public_corpus.py
      - run: python -m zmlc.cli benchmark benchmarks/public_mixed_200.jsonl --report build/benchmark/report.json
      - run: python scripts/build_plugin_runtime.py
      - run: python scripts/check_release.py
      - run: ruff check src tests scripts benchmarks

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
